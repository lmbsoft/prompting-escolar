<!DOCTYPE html>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      BrainCircuit, BookOpen, ShieldAlert, BarChart2, Lightbulb,
      Users, ChevronRight, ChevronLeft, CheckCircle2, AlertCircle,
      MessageSquare, GraduationCap, Sparkles, ClipboardList,
      MessageCircle, PlayCircle, Info, ArrowLeft, CheckCircle,
      XCircle, Pencil, FlaskConical, Globe, Music, Dumbbell,
      Palette, Languages, Calculator
    } from 'lucide-react';

    // ─────────────────────────────────────────────
    // DATOS: MÓDULOS TEÓRICOS
    // ─────────────────────────────────────────────
    const content = {
      primary: [
        {
          id: 'dp1',
          title: 'La IA como Asistente Pedagógico',
          icon: <BrainCircuit className="w-6 h-6" />,
          theory: `La IA generativa no viene a reemplazar al docente ni a automatizar la enseñanza. Viene a hacerse cargo del trabajo de borrador: generar el primer 70% de un material para que vos pongas el 30% restante que lo convierte en algo real para tu aula. Sabe mucho sobre contenido curricular, pero no sabe nada sobre tus alumnos, tu contexto institucional ni tu criterio pedagógico. Esa combinación —lo que la IA produce más lo que vos decidís— es donde está el valor.`,
          extendedTheory: (
            <div className="space-y-6 text-slate-700 leading-relaxed text-base">
              <h4 className="text-xl font-bold text-blue-700 mb-4">El principio del primer borrador</h4>
              <p>Una de las tareas que más tiempo consume en la práctica docente es la producción de materiales: textos para leer, problemas de matemáticas, consignas de escritura, rúbricas de evaluación, guías de experimentos. Ninguna de estas tareas requiere que la creatividad parta de cero cada vez. La IA puede generar un borrador sólido en segundos. Tu trabajo pasa a ser revisar, ajustar, contextualizar y decidir.</p>
              <div className="bg-blue-50 p-5 rounded-xl border-l-4 border-blue-400 my-6">
                <p className="font-bold text-blue-800 mb-2">Lo que la IA puede hacer por vos</p>
                <ul className="list-disc pl-5 space-y-2 text-blue-900">
                  <li>Generar múltiples versiones de una actividad para distintos niveles de la clase.</li>
                  <li>Redactar textos de lectura sobre un tema con vocabulario ajustado al grado.</li>
                  <li>Proponer secuencias didácticas que vos luego adaptás.</li>
                  <li>Crear ejercicios, problemas y consignas en cantidad y variedad.</li>
                  <li>Redactar circulares, notas y comunicaciones institucionales.</li>
                  <li>Sugerir criterios de evaluación y rúbricas que vos refinás.</li>
                </ul>
              </div>
              <div className="bg-red-50 p-5 rounded-xl border-l-4 border-red-400 my-6">
                <p className="font-bold text-red-800 mb-2">Lo que la IA no puede hacer</p>
                <ul className="list-disc pl-5 space-y-2 text-red-900">
                  <li>Conocer a tus alumnos, sus historias, sus avances y sus dificultades específicas.</li>
                  <li>Entender el clima del aula ni la dinámica grupal de tu curso.</li>
                  <li>Reemplazar tu criterio sobre qué es pertinente en tu contexto institucional.</li>
                  <li>Garantizar que la información que genera es exacta: puede equivocarse con datos, fechas o fuentes.</li>
                  <li>Adaptar el material al PEI de tu escuela ni a los acuerdos de ciclo de tu equipo.</li>
                </ul>
              </div>
              <h4 className="text-xl font-bold text-blue-700 mt-6 mb-3">Un cambio de flujo de trabajo, no de rol</h4>
              <p>Incorporar IA a la práctica docente no cambia quién sos como educador ni qué decisiones tomás. Cambia el orden del proceso: en lugar de empezar desde la página en blanco, empezás desde un material que ya tiene estructura y que vos mejorás. El criterio pedagógico, la contextualización y la decisión final siempre son tuyas.</p>
              <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-200 mt-6">
                <p className="font-bold text-indigo-800 mb-2">La regla del 70/30</p>
                <p className="text-indigo-900">La IA produce el 70%: estructura, contenido base, opciones. Vos ponés el 30%: contexto de tu aula, ajuste al nivel real de tus alumnos, conexión con lo que trabajaron la semana pasada, tu voz y tu criterio. Ese 30% es lo que convierte un material genérico en un material tuyo.</p>
              </div>
            </div>
          ),
          activity: {
            type: 'scenarioChoice',
            question: 'Una colega dice: "Yo no uso IA porque si lo hace la máquina, el material no es mío". ¿Cuál de estas respuestas refleja mejor el enfoque de este módulo?',
            choices: [
              { text: 'Tiene razón. Si la IA lo genera, la autoría pedagógica se pierde.', correct: false, feedback: 'La autoría pedagógica está en las decisiones: qué pedís, cómo lo ajustás, para quién lo usás y con qué criterio. Un docente que usa IA para generar un borrador y lo adapta a su aula está ejerciendo exactamente eso.' },
              { text: 'La IA genera el borrador; el docente pone el contexto, el criterio y la decisión final. El material sigue siendo tuyo.', correct: true, feedback: 'Exacto. La herramienta produce el primer 70%. El 30% que lo convierte en un material contextualizado, pertinente y pedagógicamente sólido depende enteramente del docente.' },
              { text: 'Tiene razón en parte: conviene usar IA solo para tareas administrativas, no para materiales de clase.', correct: false, feedback: 'No hay una distinción clara entre "tareas administrativas" y "materiales de clase" que justifique esa limitación. El mismo criterio de uso responsable aplica a ambas.' }
            ]
          }
        },
        {
          id: 'dp2',
          title: 'El Prompt Docente Efectivo',
          icon: <MessageSquare className="w-6 h-6" />,
          theory: `La calidad del material que la IA produce depende casi completamente de la calidad de la instrucción que le das. Un prompt vago produce un material genérico. Un prompt con rol, contexto, nivel, formato y restricciones produce algo que podés usar. La buena noticia es que esta habilidad se entrena rápido: hay una fórmula de cinco variables que funciona para casi cualquier tarea docente, y la iteración —pedir, revisar, ajustar— es parte del proceso.`,
          extendedTheory: (
            <div className="space-y-6 text-slate-700 leading-relaxed text-base">
              <h4 className="text-xl font-bold text-blue-700 mb-4">Las cinco variables de un prompt docente</h4>
              <p>No hace falta escribir prompts perfectos desde el primer intento. Pero sí conviene conocer las variables que marcan la diferencia entre una respuesta genérica y una que sirve.</p>
              <div className="space-y-4 mt-4">
                <div className="bg-white border border-blue-200 rounded-xl p-4">
                  <p className="font-bold text-blue-800">1. ROL</p>
                  <p className="text-slate-600 text-sm mt-1">¿Qué posición debe tomar la IA? <em>"Actuá como especialista en didáctica de matemáticas para el nivel primario"</em> produce resultados muy distintos a pedirlo sin contexto.</p>
                </div>
                <div className="bg-white border border-blue-200 rounded-xl p-4">
                  <p className="font-bold text-blue-800">2. CONTEXTO</p>
                  <p className="text-slate-600 text-sm mt-1">¿Para quién es y en qué situación? Grado, materia, momento del año, qué contenido se trabajó antes. <em>"Para un 4to grado que acaba de ver multiplicación y todavía no vio división"</em>.</p>
                </div>
                <div className="bg-white border border-blue-200 rounded-xl p-4">
                  <p className="font-bold text-blue-800">3. NIVEL</p>
                  <p className="text-slate-600 text-sm mt-1">¿Qué complejidad? ¿Para qué perfil de alumno? Podés especificar: <em>"nivel introductorio"</em>, <em>"para alumnos con dificultades de comprensión lectora"</em>, <em>"versión desafío para alumnos avanzados"</em>.</p>
                </div>
                <div className="bg-white border border-blue-200 rounded-xl p-4">
                  <p className="font-bold text-blue-800">4. FORMATO</p>
                  <p className="text-slate-600 text-sm mt-1">¿Cómo debe estar estructurado el resultado? <em>"5 problemas numerados"</em>, <em>"tabla de dos columnas"</em>, <em>"texto narrativo de no más de 200 palabras"</em>, <em>"consigna con tres pasos"</em>.</p>
                </div>
                <div className="bg-white border border-blue-200 rounded-xl p-4">
                  <p className="font-bold text-blue-800">5. RESTRICCIONES</p>
                  <p className="text-slate-600 text-sm mt-1">¿Qué debe evitar? <em>"Sin usar operaciones con decimales"</em>, <em>"sin vocabulario técnico"</em>, <em>"que no requiera materiales especiales"</em>, <em>"apto para trabajo en parejas"</em>.</p>
                </div>
              </div>
              <div className="bg-blue-50 p-5 rounded-xl border-l-4 border-blue-400 my-6">
                <p className="font-bold text-blue-800 mb-2">Ejemplo comparado</p>
                <p className="text-slate-700 mb-3"><strong>Prompt básico:</strong> <em>"Haceme problemas de sumas para 2do grado."</em></p>
                <p className="text-slate-500 text-sm mb-4">→ Resultado: cinco sumas estándar sin contexto, probablemente demasiado fáciles o difíciles, sin narrativa.</p>
                <p className="text-slate-700 mb-3"><strong>Prompt con las cinco variables:</strong> <em>"Actuá como docente de matemáticas de primaria. Necesito 4 problemas de sumas con reagrupación para 2do grado. El contexto debe ser una feria de la escuela para que resulte familiar. Que cada problema tenga un enunciado de 2-3 oraciones y la pregunta final. Sin decimales ni multiplicación. Que se puedan resolver en 10 minutos."</em></p>
                <p className="text-slate-500 text-sm">→ Resultado: material usable, contextualizado, con dificultad apropiada.</p>
              </div>
              <h4 className="text-xl font-bold text-blue-700 mt-6 mb-3">Iterar es parte del proceso</h4>
              <p>El primer resultado raramente es el definitivo. Si la respuesta no es lo que necesitabas, no empezás de cero: continuás el mismo chat ajustando. <em>"Muy difícil para mi grupo. Simplificá el vocabulario."</em> o <em>"Perfecto el formato, pero cambiá el contexto a algo relacionado con animales."</em> La IA recuerda todo lo que escribiste en esa conversación.</p>
              <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-200 mt-6">
                <p className="font-bold text-indigo-800 mb-2">Tip de productividad</p>
                <p className="text-indigo-900">Guardá tus mejores prompts en un documento de texto. Con el tiempo vas a tener una biblioteca de prompts que funcionan para tu grado y materia, y solo vas a necesitar ajustar pequeños detalles para cada uso.</p>
              </div>
            </div>
          ),
          activity: {
            type: 'promptIterative',
            question: 'Ejercicio de mejora de prompt: Construí un prompt docente completo paso a paso',
            steps: [
              { instruction: 'Escribí un prompt básico para pedirle a la IA un texto de lectura para tu grado y materia.', feedback: 'Buen punto de partida. Ahora tenemos un pedido, pero la IA no sabe el nivel exacto, el tema ni cómo debe estar estructurado el texto.' },
              { instruction: 'Ahora agregá ROL + CONTEXTO al mismo prompt: especificá para qué grado es, qué tema están viendo y qué aprendieron antes.', feedback: 'Mucho mejor. La IA ya tiene contexto pedagógico. Ahora falta el formato y las restricciones para que el resultado sea directamente usable.' },
              { instruction: 'Completá el prompt con FORMATO (longitud, estructura) y al menos una RESTRICCIÓN (algo que el texto no debe incluir o algo que sí debe tener).', feedback: '¡Excelente! Tenés un prompt docente completo con las cinco variables. Este tipo de instrucción produce materiales que podés usar con mínimos ajustes.' }
            ]
          }
        },
        {
          id: 'dp3',
          title: 'Actividades Diferenciadas con IA',
          icon: <Users className="w-6 h-6" />,
          theory: `Uno de los mayores desafíos del aula de primaria es la heterogeneidad: alumnos con niveles muy distintos trabajando en el mismo espacio. Generar tres versiones de una misma actividad —básica, estándar y desafío— solía llevar horas. Con IA, podés tener esas tres versiones en minutos si sabés cómo pedirlas. El mismo principio aplica para adaptaciones curriculares, materiales para alumnos con dificultades específicas y ampliaciones para quienes van adelantado.`,
          extendedTheory: (
            <div className="space-y-6 text-slate-700 leading-relaxed text-base">
              <h4 className="text-xl font-bold text-blue-700 mb-4">Tres versiones, un mismo objetivo</h4>
              <p>La diferenciación no significa actividades distintas para cada alumno, sino variaciones de una misma tarea que comparten el objetivo de aprendizaje pero difieren en complejidad, cantidad de apoyo o nivel de abstracción. La IA es especialmente eficiente para generar esas variaciones una vez que tenés la versión base.</p>
              <div className="bg-blue-50 p-5 rounded-xl border-l-4 border-blue-400 my-6">
                <p className="font-bold text-blue-800 mb-3">Cómo pedirlo</p>
                <p className="text-slate-700 mb-2"><strong>Paso 1:</strong> Pedí la versión estándar con contexto completo.</p>
                <p className="text-slate-700 mb-2"><strong>Paso 2:</strong> En el mismo chat, pedí: <em>"Ahora generá una versión simplificada de esta actividad para alumnos que necesitan más apoyo. Reducí la cantidad de ítems, usá vocabulario más simple y agregá un ejemplo resuelto al inicio."</em></p>
                <p className="text-slate-700"><strong>Paso 3:</strong> <em>"Ahora generá una versión de desafío para alumnos avanzados. Manteniendo el mismo tema, aumentá la complejidad con un paso adicional de razonamiento o una variable extra."</em></p>
              </div>
              <h4 className="text-xl font-bold text-blue-700 mt-6 mb-3">Adaptaciones específicas</h4>
              <p>Más allá de los tres niveles, la IA puede ayudarte a generar adaptaciones particulares:</p>
              <ul className="list-disc pl-6 space-y-3 mt-4">
                <li><strong>Para dificultades de comprensión lectora:</strong> pedí que el texto tenga oraciones más cortas, vocabulario más frecuente y que incluya imágenes descriptivas entre paréntesis.</li>
                <li><strong>Para alumnos con TEA o necesidades de estructuración visual:</strong> pedí que la consigna esté en pasos numerados, con un solo pedido por paso.</li>
                <li><strong>Para ampliar a alumnos avanzados:</strong> pedí una pregunta de metacognición al final o una conexión con otro campo de conocimiento.</li>
              </ul>
              <div className="bg-amber-50 p-5 rounded-xl border-l-4 border-amber-400 my-6">
                <p className="font-bold text-amber-800 mb-2">Importante: la IA no conoce a tus alumnos</p>
                <p className="text-amber-900">Las adaptaciones que genera son genéricas para un perfil que vos describís. Siempre revisalas con el conocimiento que tenés de cada alumno. Lo que la IA produce es un punto de partida, no una adaptación curricular individual.</p>
              </div>
              <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-200 mt-6">
                <p className="font-bold text-indigo-800 mb-2">Ahorro de tiempo real</p>
                <p className="text-indigo-900">Lo que antes requería preparar tres documentos separados ahora puede resolverse en una sola conversación de cinco minutos. El tiempo ahorrado puede usarse para observar mejor a los alumnos, preparar la puesta en común o diseñar la siguiente secuencia.</p>
              </div>
            </div>
          ),
          activity: {
            type: 'scenarioChoice',
            question: 'Tenés una actividad de comprensión lectora estándar para 3er grado. ¿Cuál de estos prompts va a generar mejor una versión de apoyo?',
            choices: [
              { text: '"Hacela más fácil."', correct: false, feedback: 'Demasiado vago. La IA no sabe qué aspecto simplificar: ¿el vocabulario, la longitud, la cantidad de preguntas, el nivel de inferencia requerido? Un prompt sin especificación produce una simplificación aleatoria que puede no adaptarse a lo que necesitás.' },
              { text: '"Generá una versión de apoyo de esta actividad para alumnos con dificultades de comprensión lectora. Reducí el texto a la mitad, simplificá el vocabulario, agregá un ejemplo resuelto y reducí las preguntas a 3 de tipo literal."', correct: true, feedback: 'Exacto. Especificaste qué cambiar (longitud, vocabulario, estructura, tipo de preguntas) y para qué perfil. La IA puede generar exactamente eso. El resultado va a requerir revisión, pero va a ser un punto de partida sólido.' },
              { text: '"Hacela para alumnos con necesidades especiales."', correct: false, feedback: '"Necesidades especiales" es una categoría demasiado amplia y heterogénea. La IA necesita saber qué tipo de dificultad específica querés abordar para generar algo útil.' }
            ]
          }
        },
        {
          id: 'dp4',
          title: 'Privacidad y Ética con Datos de Alumnos',
          icon: <ShieldAlert className="w-6 h-6" />,
          theory: `Al usar IA para preparar materiales, es fácil caer en la tentación de compartir información real de los alumnos para que el resultado sea más ajustado. Eso es un problema serio. Los sistemas de IA públicos guardan conversaciones para mejorar sus modelos y pueden ser auditados por personas. Los datos de menores de edad tienen protección legal específica en Argentina y en la mayoría de los países. La regla es simple: nunca ingresés nombres, apellidos, DNI, situaciones personales, resultados de evaluaciones ni ningún dato que permita identificar a un alumno real.`,
          extendedTheory: (
            <div className="space-y-6 text-slate-700 leading-relaxed text-base">
              <h4 className="text-xl font-bold text-blue-700 mb-4">Qué datos están en riesgo</h4>
              <p>No siempre es obvio qué información es sensible. En el contexto de uso de IA para la práctica docente, conviene aplicar la precaución a todo lo siguiente:</p>
              <div className="bg-red-50 p-5 rounded-xl border-l-4 border-red-400 my-6">
                <p className="font-bold text-red-800 mb-2">Nunca ingresar en sistemas de IA públicos</p>
                <ul className="list-disc pl-5 space-y-2 text-red-900">
                  <li>Nombres y apellidos de alumnos.</li>
                  <li>Situaciones familiares, diagnósticos o historias personales aunque sea para pedir orientación.</li>
                  <li>Resultados de evaluaciones vinculados a un nombre.</li>
                  <li>Fotos de trabajos o producciones que permitan identificar al autor.</li>
                  <li>Información institucional confidencial (conflictos internos, datos de legajos).</li>
                </ul>
              </div>
              <h4 className="text-xl font-bold text-blue-700 mt-6 mb-3">La técnica de anonimización</h4>
              <p>Podés obtener toda la ayuda que necesitás sin compartir datos reales. El truco es reemplazar lo específico por lo genérico:</p>
              <div className="bg-slate-100 p-5 rounded-xl border border-slate-200 my-4">
                <p className="text-slate-500 text-sm mb-2">En lugar de:</p>
                <p className="text-slate-800 italic mb-4">"Tengo un alumno llamado Martín, 8 años, con diagnóstico de dislexia y problemas familiares. ¿Cómo le enseño a leer?"</p>
                <p className="text-slate-500 text-sm mb-2">Escribí:</p>
                <p className="text-blue-800 italic">"Tengo un alumno de 2do grado con dificultades en el proceso lector, posiblemente dislexia. ¿Qué estrategias y materiales puedo usar para trabajar la conciencia fonológica?"</p>
              </div>
              <p>El resultado es igual de útil o más, porque la IA puede darte estrategias generales con evidencia pedagógica en lugar de responder sobre un caso que no conoce en profundidad.</p>
              <div className="bg-amber-50 p-5 rounded-xl border-l-4 border-amber-400 my-6">
                <p className="font-bold text-amber-800 mb-2">Marco legal en Argentina</p>
                <p className="text-amber-900">La Ley 25.326 de Protección de Datos Personales protege la información de los alumnos. El tratamiento de datos de menores requiere consentimiento parental. Usar sistemas de IA con datos identificables de alumnos sin autorización institucional puede tener implicancias legales para el docente y la institución.</p>
              </div>
              <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-200 mt-6">
                <p className="font-bold text-indigo-800 mb-2">Preguntale a tu institución</p>
                <p className="text-indigo-900">Cada vez más escuelas están desarrollando políticas de uso de IA. Si tu institución no tiene una todavía, este es un buen momento para proponer que se construya. Podés usar la IA para ayudar a redactar el borrador de esa política, siempre que no incluyas datos reales.</p>
              </div>
            </div>
          ),
          activity: {
            type: 'scenarioChoice',
            question: 'Necesitás orientación sobre cómo trabajar con una alumna que tiene dificultades atencionales. ¿Cuál de estos mensajes podés enviarle a una IA pública?',
            choices: [
              { text: '"Sofia García, 7 años, 2do grado B de la Escuela N°14, tiene TDAH diagnosticado. Su mamá trabaja de noche y hay mucha desorganización en casa. ¿Cómo la ayudo en clase?"', correct: false, feedback: 'Este mensaje contiene nombre completo, edad, institución, diagnóstico y situación familiar: todo dato sensible que no debe enviarse a un sistema de IA público. Además, la IA no necesita esa información para darte estrategias pedagógicas útiles.' },
              { text: '"Tengo una alumna de 2do grado con diagnóstico de TDAH. ¿Qué estrategias de aula y qué ajustes en las consignas pueden ayudarla a sostener la atención y organizarse mejor?"', correct: true, feedback: 'Perfecto. Eliminaste todos los datos identificables y mantuviste la información pedagógicamente relevante. La IA puede darte estrategias con evidencia sin necesitar saber quién es la alumna.' },
              { text: '"Una alumna mía no puede concentrarse. ¿Qué hago?"', correct: false, feedback: 'No hay datos sensibles, pero el prompt es demasiado vago para producir orientación útil. La IA no sabe el grado, el diagnóstico ni el contexto. Proteger la privacidad y escribir un prompt efectivo no son objetivos opuestos.' }
            ]
          }
        },
        {
          id: 'dp5',
          title: 'Evaluación Asistida: Rúbricas e Instrumentos',
          icon: <BarChart2 className="w-6 h-6" />,
          theory: `El diseño de instrumentos de evaluación es otra de las tareas que más tiempo consume en la práctica docente. La IA puede generar borradores de rúbricas, listas de cotejo, criterios de evaluación oral, preguntas de autoevaluación y plantillas de feedback en tiempo muy reducido. Como siempre, el resultado es un punto de partida: vos ajustás los criterios para que reflejen exactamente lo que enseñaste, el nivel real de tu grupo y los acuerdos del equipo docente.`,
          extendedTheory: (
            <div className="space-y-6 text-slate-700 leading-relaxed text-base">
              <h4 className="text-xl font-bold text-blue-700 mb-4">Tipos de instrumentos que podés generar</h4>
              <ul className="list-disc pl-6 space-y-3 mt-2">
                <li><strong>Rúbricas analíticas:</strong> con dimensiones, niveles de desempeño y descriptores. Pedile a la IA que genere entre 3 y 5 dimensiones con 4 niveles cada una para una tarea específica.</li>
                <li><strong>Listas de cotejo:</strong> para evaluar si algo está presente o ausente. Ideal para producción escrita, proyectos y presentaciones orales.</li>
                <li><strong>Preguntas de autoevaluación:</strong> para que los alumnos reflexionen sobre su propio proceso. La IA puede generar preguntas adaptadas al grado con lenguaje apropiado.</li>
                <li><strong>Plantillas de feedback:</strong> estructuras para escribir devoluciones personalizadas que la IA puede completar con distintos casos.</li>
                <li><strong>Consignas de evaluación integradora:</strong> situaciones problema que integren varios contenidos trabajados.</li>
              </ul>

            </div>
          )}
          <p className="font-semibold text-slate-800">{data.question}</p>
          <div className="space-y-3">
            {data.choices.map((c, i) => {
              const isSelected = selected === i;
              const bg = !isSelected ? 'bg-white border-slate-200 hover:border-blue-400 hover:bg-blue-50' : c.correct ? 'bg-emerald-50 border-emerald-400' : 'bg-red-50 border-red-400';
              return (
                <button key={i} onClick={() => handleSelect(i)} disabled={selected !== null}
                  className={`w-full text-left p-4 rounded-xl border-2 transition font-medium ${bg}`}>
                  <div className="flex items-start gap-3">
                    {isSelected ? (c.correct ? <CheckCircle className="w-5 h-5 text-emerald-600 shrink-0 mt-0.5" /> : <XCircle className="w-5 h-5 text-red-500 shrink-0 mt-0.5" />) : <div className="w-5 h-5 rounded-full border-2 border-slate-300 shrink-0 mt-0.5" />}
                    <span>{c.text}</span>
                  </div>
                  {isSelected && <p className="mt-3 text-sm pl-8 text-slate-600">{c.feedback}</p>}
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const PromptIterative = ({ data, onComplete }) => {
      const [step, setStep] = useState(0);
      const [input, setInput] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        if (input.trim().length < 10) return;
        setInput('');
        if (step < data.steps.length - 1) setStep(s => s + 1);
        else { setStep(s => s + 1); onComplete(); }
      };
      return (
        <div className="space-y-5">
          <div className="flex gap-2 mb-4">
            {data.steps.map((_, i) => (
              <div key={i} className={`h-2 flex-1 rounded-full ${i <= step ? 'bg-blue-500' : 'bg-slate-200'}`} />
            ))}
          </div>
          {step < data.steps.length ? (
            <div className="bg-white p-5 rounded-xl border shadow-sm">
              <p className="font-semibold text-blue-800 mb-4">{data.steps[step].instruction}</p>
              <form onSubmit={handleSubmit} className="flex gap-2">
                <input type="text" value={input} onChange={e => setInput(e.target.value)}
                  placeholder="Escribí tu prompt acá..."
                  className="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm" />
                <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-lg font-bold text-sm">Enviar</button>
              </form>
              {step > 0 && <p className="mt-4 p-3 bg-blue-50 text-blue-700 rounded-lg text-sm border border-blue-100">Nota del paso anterior: <em>{data.steps[step - 1].feedback}</em></p>}
            </div>
          ) : (
            <SuccessMessage text="¡Completaste el ejercicio! Guardá este prompt como modelo para tu biblioteca personal." />
          )}
        </div>
      );
    };

    const Quiz = ({ data, onComplete }) => {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const handleAnswer = (idx) => {
        if (idx === data.questions[currentQ].answer) setScore(s => s + 1);
        if (currentQ < data.questions.length - 1) setCurrentQ(q => q + 1);
        else { setShowResult(true); onComplete(); }
      };
      if (showResult) return (
        <div className="text-center space-y-3 p-6 bg-blue-50 rounded-xl border border-blue-200">
          <GraduationCap className="w-12 h-12 text-blue-500 mx-auto" />
          <h3 className="text-xl font-bold text-blue-900">Módulo completado</h3>
          <p className="text-slate-600">Puntaje: {score} de {data.questions.length}</p>
        </div>
      );
      const q = data.questions[currentQ];
      return (
        <div className="space-y-5">
          <p className="text-sm font-medium text-slate-400">Pregunta {currentQ + 1} de {data.questions.length}</p>
          <p className="font-semibold text-slate-800">{q.q}</p>
          <div className="space-y-3">
            {q.options.map((opt, i) => (
              <button key={i} onClick={() => handleAnswer(i)}
                className="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition font-medium text-sm">
                {opt}
              </button>
            ))}
          </div>
        </div>
      );
    };

    // ── Módulos ──

    const ModuleCard = ({ module, index, onClick, completed }) => (
      <button onClick={onClick}
        className="w-full text-left bg-white rounded-2xl border-2 border-slate-200 hover:border-blue-400 hover:shadow-lg transition-all p-5 group">
        <div className="flex items-start justify-between mb-3">
          <div className="flex items-center gap-3">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${completed ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}>
              {completed ? <CheckCircle2 className="w-5 h-5" /> : module.icon}
            </div>
            <span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Módulo {index + 1}</span>
          </div>
          <ChevronRight className="w-5 h-5 text-slate-300 group-hover:text-blue-500 transition-colors" />
        </div>
        <h3 className="font-bold text-slate-800 text-lg mb-2">{module.title}</h3>
        <p className="text-slate-500 text-sm leading-relaxed line-clamp-3">{module.theory}</p>
      </button>
    );

    const ModuleDetail = ({ module, onBack, onComplete, completed }) => {
      const [showExtended, setShowExtended] = useState(false);
      const [activityDone, setActivityDone] = useState(completed);
      const renderActivity = () => {
        const { activity } = module;
        const props = { data: activity, onComplete: () => { setActivityDone(true); onComplete(module.id); } };
        if (activity.type === 'scenarioChoice') return <ScenarioChoice {...props} />;
        if (activity.type === 'promptIterative') return <PromptIterative {...props} />;
        if (activity.type === 'quiz') return <Quiz {...props} />;
        return null;
      };
      return (
        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
          <div className="bg-gradient-to-r from-blue-700 to-indigo-700 p-6 text-white">
            <button onClick={onBack} className="flex items-center gap-2 text-blue-200 hover:text-white mb-4 text-sm transition-colors">
              <ArrowLeft className="w-4 h-4" /> Volver a módulos
            </button>
            <div className="flex items-center gap-3 mb-2">
              <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">{module.icon}</div>
              <h2 className="text-2xl font-bold">{module.title}</h2>
            </div>
          </div>
          <div className="p-6 space-y-6">
            <div className="bg-slate-50 rounded-xl p-5 border border-slate-200">
              <p className="text-slate-700 leading-relaxed">{module.theory}</p>
            </div>
            <button onClick={() => setShowExtended(!showExtended)}
              className="w-full flex items-center justify-between p-4 bg-blue-50 border border-blue-200 rounded-xl text-blue-700 font-semibold hover:bg-blue-100 transition">
              <span>{showExtended ? 'Cerrar desarrollo' : 'Ver desarrollo completo'}</span>
              {showExtended ? <ChevronLeft className="w-5 h-5" /> : <ChevronRight className="w-5 h-5" />}
            </button>
            {showExtended && (
              <div className="bg-white border border-slate-200 rounded-xl p-6">
                {module.extendedTheory}
              </div>
            )}
            <div className="border-t pt-6">
              <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                <ClipboardList className="w-5 h-5 text-blue-500" /> Actividad práctica
              </h3>
              {renderActivity()}
              {activityDone && <SuccessMessage text="Actividad completada. Podés continuar con el siguiente módulo." />}
            </div>
          </div>
        </div>
      );
    };

    const ModulesSection = ({ level }) => {
      const modules = content[level];
      const [active, setActive] = useState(null);
      const [completed, setCompleted] = useState({});
      if (active !== null) {
        const mod = modules[active];
        return (
          <ModuleDetail
            module={mod}
            onBack={() => setActive(null)}
            onComplete={(id) => setCompleted(c => ({ ...c, [id]: true }))}
            completed={!!completed[mod.id]}
          />
        );
      }
      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl border border-slate-200 p-6">
            <h2 className="text-2xl font-bold text-slate-800 mb-2">Módulos teóricos</h2>
            <p className="text-slate-500">Recorrido formativo sobre uso pedagógico de IA. Cada módulo incluye desarrollo teórico y una actividad de reflexión o práctica.</p>
          </div>
          <div className="grid md:grid-cols-2 gap-4">
            {modules.map((m, i) => (
              <ModuleCard key={m.id} module={m} index={i} onClick={() => setActive(i)} completed={!!completed[m.id]} />
            ))}
          </div>
        </div>
      );
    };

    // ── Gimnasio ──

    const categoryMeta = {
      planning: { label: 'Planificación', color: 'bg-blue-100 text-blue-800', icon: <ClipboardList className="w-4 h-4" /> },
      activities: { label: 'Actividades', color: 'bg-indigo-100 text-indigo-800', icon: <Pencil className="w-4 h-4" /> },
      evaluation: { label: 'Evaluación', color: 'bg-violet-100 text-violet-800', icon: <BarChart2 className="w-4 h-4" /> },
      communication: { label: 'Comunicación', color: 'bg-sky-100 text-sky-800', icon: <MessageSquare className="w-4 h-4" /> },
      collaboration: { label: 'Trabajo Colaborativo', color: 'bg-teal-100 text-teal-800', icon: <Users className="w-4 h-4" /> }
    };

    const GymCard = ({ item }) => {
      const [open, setOpen] = useState(false);
      const cat = categoryMeta[item.category] || { label: item.category, color: 'bg-slate-100 text-slate-700', icon: null };
      return (
        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
          <button onClick={() => setOpen(!open)} className="w-full text-left p-5">
            <div className="flex items-start justify-between mb-2">
              <div className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold ${cat.color}`}>
                {cat.icon} {cat.label}
              </div>
              <span className="text-xs text-slate-400 font-medium">{item.subject}</span>
            </div>
            <h3 className="font-bold text-slate-800 mb-1">{item.title}</h3>
            <p className="text-slate-500 text-sm">{item.task}</p>
          </button>
          {open && (
            <div className="border-t border-slate-100 p-5 space-y-4 bg-slate-50">
              <div className="bg-red-50 border border-red-200 rounded-xl p-4">
                <p className="text-xs font-bold text-red-700 uppercase tracking-wide mb-2">Prompt poco efectivo</p>
                <p className="font-mono text-sm text-slate-700 mb-2 italic">"{item.bad.prompt}"</p>
                <p className="text-xs text-red-700">Por qué no funciona: {item.bad.reason}</p>
              </div>
              <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
                <p className="text-xs font-bold text-emerald-700 uppercase tracking-wide mb-3">Prompt efectivo</p>
                {item.good.steps.map((s, i) => (
                  <div key={i} className="mb-3">
                    <p className="text-xs font-bold text-emerald-800 mb-1">{s.title}</p>
                    <p className="font-mono text-sm text-slate-700 bg-white p-3 rounded-lg border border-emerald-100 italic">"{s.prompt}"</p>
                  </div>
                ))}
                <p className="text-xs text-emerald-800 mt-2 font-medium">Por qué funciona: {item.good.reason}</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    const GymSection = ({ level }) => {
      const items = gymData[level];
      const categories = [...new Set(items.map(i => i.category))];
      const [activeCategory, setActiveCategory] = useState('all');
      const filtered = activeCategory === 'all' ? items : items.filter(i => i.category === activeCategory);
      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl border border-slate-200 p-6">
            <h2 className="text-2xl font-bold text-slate-800 mb-2">Gimnasio de Prompts</h2>
            <p className="text-slate-500">Comparativas de prompts poco efectivos vs. efectivos para tareas docentes reales. Cada caso muestra qué cambia y por qué.</p>
          </div>
          <div className="flex gap-2 flex-wrap">
            <button onClick={() => setActiveCategory('all')}
              className={`px-4 py-2 rounded-full text-sm font-semibold transition ${activeCategory === 'all' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-400'}`}>
              Todos ({items.length})
            </button>
            {categories.map(cat => {
              const meta = categoryMeta[cat] || { label: cat };
              return (
                <button key={cat} onClick={() => setActiveCategory(cat)}
                  className={`px-4 py-2 rounded-full text-sm font-semibold transition ${activeCategory === cat ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:border-blue-400'}`}>
                  {meta.label} ({items.filter(i => i.category === cat).length})
                </button>
              );
            })}
          </div>
          <div className="grid md:grid-cols-2 gap-4">
            {filtered.map(item => <GymCard key={item.id} item={item} />)}
          </div>
        </div>
      );
    };

    // ── Historias ──

    const StoryPlayer = ({ story, onBack }) => {
      const [currentStep, setCurrentStep] = useState(0);
      const visible = story.messages.slice(0, currentStep + 1);
      return (
        <div className="bg-slate-100 rounded-2xl shadow-lg overflow-hidden border border-slate-200">
          <div className="bg-white p-4 border-b flex items-center gap-4 sticky top-0 z-10">
            <button onClick={onBack} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition">
              <ArrowLeft className="w-5 h-5 text-slate-600" />
            </button>
            <div>
              <h3 className="font-bold text-lg leading-tight">{story.title}</h3>
              <p className="text-xs text-slate-500">{story.context}</p>
            </div>
          </div>
          <div className="p-5 space-y-5 min-h-[400px]">
            {visible.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : msg.role === 'ai' ? 'justify-start' : 'justify-center'}`}>
                {msg.role === 'user' && (
                  <div className="max-w-[80%] p-4 rounded-2xl rounded-tr-sm bg-blue-600 text-white shadow-sm">
                    <p className="text-sm">{msg.content}</p>
                  </div>
                )}
                {msg.role === 'ai' && (
                  <div className="max-w-[80%] flex items-start gap-3">
                    <div className="p-2 bg-white rounded-full shadow-sm shrink-0 mt-1">
                      <BrainCircuit className="w-5 h-5 text-blue-500" />
                    </div>
                    <div className="p-4 rounded-2xl rounded-tl-sm bg-white border border-slate-200 shadow-sm text-slate-700 text-sm">
                      {msg.content}
                    </div>
                  </div>
                )}
                {msg.role === 'alert' && (
                  <div className="w-full max-w-lg my-2 p-4 bg-amber-50 border-2 border-amber-300 rounded-xl shadow-sm">
                    <p className="font-semibold text-amber-900 flex items-start gap-2 text-sm">
                      <Info className="w-5 h-5 shrink-0 text-amber-600 mt-0.5" />
                      <span>{msg.content}</span>
                    </p>
                  </div>
                )}
                {msg.role === 'action' && (
                  <div className="w-full text-center my-1">
                    <span className="inline-block px-4 py-2 bg-slate-200 text-slate-600 text-xs italic rounded-full border border-slate-300">
                      {msg.content}
                    </span>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="bg-white p-4 border-t text-center">
            {currentStep < story.messages.length - 1 ? (
              <button onClick={() => setCurrentStep(s => s + 1)}
                className="px-8 py-3 rounded-full font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md transition">
                Siguiente →
              </button>
            ) : (
              <div className="space-y-3">
                <p className="font-bold text-blue-800">Historia completada</p>
                <button onClick={onBack} className="px-6 py-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-700 font-medium text-sm transition">
                  Volver a historias
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const StoriesSection = ({ level }) => {
      const stories = storiesData[level];
      const [active, setActive] = useState(null);
      if (active !== null) return <StoryPlayer story={stories[active]} onBack={() => setActive(null)} />;
      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl border border-slate-200 p-6">
            <h2 className="text-2xl font-bold text-slate-800 mb-2">Historias de Aula</h2>
            <p className="text-slate-500">Casos reales de docentes usando IA para planificar y preparar materiales. Cada historia muestra un error frecuente y cómo resolverlo.</p>
          </div>
          <div className="grid md:grid-cols-2 gap-5">
            {stories.map((s, i) => (
              <div key={s.id} onClick={() => setActive(i)}
                className="bg-white p-6 rounded-2xl border-2 border-slate-200 hover:border-blue-400 hover:shadow-lg cursor-pointer transition-all group">
                <div className="flex justify-between items-start mb-4">
                  <span className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">{s.subject}</span>
                  <PlayCircle className="w-7 h-7 text-slate-300 group-hover:text-blue-500 transition-colors" />
                </div>
                <h3 className="text-xl font-bold text-slate-800 mb-2">{s.title}</h3>
                <p className="text-sm text-slate-500">{s.context}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ── Navegación principal ──

    const TABS = [
      { id: 'modules', label: 'Módulos', icon: <BookOpen className="w-4 h-4" /> },
      { id: 'gym', label: 'Gimnasio de Prompts', icon: <Lightbulb className="w-4 h-4" /> },
      { id: 'stories', label: 'Historias de Aula', icon: <MessageCircle className="w-4 h-4" /> }
    ];

    const MainApp = ({ level, onBack }) => {
      const [tab, setTab] = useState('modules');
      const levelLabel = level === 'primary' ? 'Nivel Primario' : 'Nivel Secundario';
      return (
        <div>
          <div className="bg-gradient-to-r from-blue-800 to-indigo-800 text-white p-6 mb-6 rounded-b-3xl">
            <button onClick={onBack} className="flex items-center gap-2 text-blue-200 hover:text-white mb-4 text-sm transition">
              <ArrowLeft className="w-4 h-4" /> Cambiar nivel
            </button>
            <h1 className="text-2xl font-bold">IA para Docentes</h1>
            <p className="text-blue-200 text-sm mt-1">{levelLabel} · Uso pedagógico de IA generativa</p>
          </div>
          <div className="px-4 mb-6">
            <div className="bg-white rounded-2xl border border-slate-200 p-1 flex gap-1">
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold transition ${tab === t.id ? 'bg-blue-600 text-white shadow' : 'text-slate-500 hover:text-blue-600'}`}>
                  {t.icon} <span className="hidden sm:inline">{t.label}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="px-4 pb-12">
            {tab === 'modules' && <ModulesSection level={level} />}
            {tab === 'gym' && <GymSection level={level} />}
            {tab === 'stories' && <StoriesSection level={level} />}
          </div>
        </div>
      );
    };

    const LevelSelector = ({ onSelect }) => (
      <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950">
        <div className="w-full max-w-lg">
          <div className="text-center mb-12">
            <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-500/20 rounded-2xl mb-6 border border-blue-400/30">
              <GraduationCap className="w-8 h-8 text-blue-300" />
            </div>
            <h1 className="text-4xl font-bold text-white mb-3">IA para Docentes</h1>
            <p className="text-blue-200 text-lg">Herramientas pedagógicas con IA generativa</p>
            <p className="text-slate-400 text-sm mt-2">Seleccioná tu nivel para acceder al contenido correspondiente</p>
          </div>
          <div className="space-y-4">
            <button onClick={() => onSelect('primary')}
              className="w-full bg-white/10 hover:bg-white/20 border border-white/20 hover:border-blue-400/60 rounded-2xl p-6 text-left transition-all group backdrop-blur-sm">
              <div className="flex items-center justify-between">
                <div>
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-blue-500/30 rounded-xl flex items-center justify-center">
                      <BookOpen className="w-5 h-5 text-blue-300" />
                    </div>
                    <span className="text-white font-bold text-xl">Nivel Primario</span>
                  </div>
                  <p className="text-slate-300 text-sm pl-13">Materiales, actividades diferenciadas y evaluación para 1° a 6° grado</p>
                </div>
                <ChevronRight className="w-6 h-6 text-slate-400 group-hover:text-blue-300 transition-colors" />
              </div>
            </button>
            <button onClick={() => onSelect('secondary')}
              className="w-full bg-white/10 hover:bg-white/20 border border-white/20 hover:border-teal-400/60 rounded-2xl p-6 text-left transition-all group backdrop-blur-sm relative overflow-hidden">
              <div className="flex items-center justify-between">
                <div>
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 bg-teal-500/30 rounded-xl flex items-center justify-center">
                      <GraduationCap className="w-5 h-5 text-teal-300" />
                    </div>
                    <span className="text-white font-bold text-xl">Nivel Secundario</span>
                  </div>
                  <p className="text-slate-300 text-sm">Secuencias complejas, pensamiento crítico y evaluación por competencias</p>
                </div>
                <ChevronRight className="w-6 h-6 text-slate-400 group-hover:text-teal-300 transition-colors" />
              </div>
            </button>
          </div>
          <p className="text-center text-slate-500 text-xs mt-8">Recurso de formación docente · IA responsable en el aula</p>
        </div>
      </div>
    );

    const App = () => {
      const [level, setLevel] = useState(null);
      if (!level) return <LevelSelector onSelect={setLevel} />;
      return (
        <div className="max-w-3xl mx-auto">
          <MainApp level={level} onBack={() => setLevel(null)} />
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
